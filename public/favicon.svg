<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circle">
      <circle cx="50" cy="50" r="48"/>
    </clipPath>
  </defs>
  <!-- Flag stripes: Amarillo, Azul, Rojo (top to bottom) -->
  <rect x="2" y="2"  width="96" height="32" fill="#F4C300" clip-path="url(#circle)"/>
  <rect x="2" y="34" width="96" height="32" fill="#003082" clip-path="url(#circle)"/>
  <rect x="2" y="66" width="96" height="32" fill="#CF142B" clip-path="url(#circle)"/>
  <!-- 8 white stars arc in the blue stripe -->
  <g fill="#FFFFFF">
    <circle cx="50" cy="50" r="2.6" transform="rotate(-90 50 50) translate(0 -16)"/>
    <circle cx="50" cy="50" r="2.6" transform="rotate(-64 50 50) translate(0 -16)"/>
    <circle cx="50" cy="50" r="2.6" transform="rotate(-38 50 50) translate(0 -16)"/>
    <circle cx="50" cy="50" r="2.6" transform="rotate(-12 50 50) translate(0 -16)"/>
    <circle cx="50" cy="50" r="2.6" transform="rotate( 14 50 50) translate(0 -16)"/>
    <circle cx="50" cy="50" r="2.6" transform="rotate( 40 50 50) translate(0 -16)"/>
    <circle cx="50" cy="50" r="2.6" transform="rotate( 66 50 50) translate(0 -16)"/>
    <circle cx="50" cy="50" r="2.6" transform="rotate( 90 50 50) translate(0 -16)"/>
  </g>
  <!-- Circle outline -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#fff" stroke-width="2"/>
</svg>
