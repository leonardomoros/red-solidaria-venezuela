<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1918"/>
      <stop offset="100%" style="stop-color:#2C2B29"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Red top bar -->
  <rect width="1200" height="8" fill="#C0392B"/>

  <!-- Flag colors accent -->
  <rect x="0" y="8" width="400" height="4" fill="#CF142B"/>
  <rect x="400" y="8" width="400" height="4" fill="#F4C300"/>
  <rect x="800" y="8" width="400" height="4" fill="#003082"/>

  <!-- Pulse dot -->
  <circle cx="96" cy="120" r="10" fill="#C0392B" opacity="0.9"/>
  <circle cx="96" cy="120" r="18" fill="#C0392B" opacity="0.3"/>

  <!-- Logo text -->
  <text x="120" y="130" font-family="Georgia, serif" font-size="32" font-weight="400" fill="#FFFFFF">Venezuela <tspan fill="#E8B86D" font-style="italic">se Levanta</tspan></text>

  <!-- Main headline -->
  <text x="96" y="270" font-family="Georgia, serif" font-size="88" font-weight="700" fill="#FFFFFF">Busca.</text>
  <text x="96" y="368" font-family="Georgia, serif" font-size="88" font-weight="700" fill="#FFFFFF">Reporta.</text>
  <text x="96" y="468" font-family="Georgia, serif" font-size="88" font-weight="700" font-style="italic" fill="#E8B86D">Ayuda.</text>

  <!-- Right side info boxes -->
  <rect x="780" y="180" width="340" height="80" rx="12" fill="#C0392B" opacity="0.9"/>
  <text x="800" y="210" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff" opacity="0.8">🏥  FUNCIÓN 01</text>
  <text x="800" y="238" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">Buscar en hospitales</text>

  <rect x="780" y="275" width="340" height="80" rx="12" fill="#1A4F91" opacity="0.9"/>
  <text x="800" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff" opacity="0.8">📤  FUNCIÓN 02</text>
  <text x="800" y="333" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">Subir lista de pacientes</text>

  <rect x="780" y="370" width="340" height="80" rx="12" fill="#1B6B3A" opacity="0.9"/>
  <text x="800" y="400" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff" opacity="0.8">🩸  FUNCIÓN 03</text>
  <text x="800" y="428" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">Donar sangre</text>

  <rect x="780" y="465" width="340" height="80" rx="12" fill="#C8820A" opacity="0.9"/>
  <text x="800" y="495" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fff" opacity="0.8">📦  FUNCIÓN 04</text>
  <text x="800" y="523" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">Centros de acopio</text>

  <!-- Domain -->
  <text x="96" y="590" font-family="Arial, sans-serif" font-size="22" fill="#999" letter-spacing="1">redsolidariavenezuela.com</text>

  <!-- Divider line -->
  <line x1="96" y1="560" x2="700" y2="560" stroke="#444" stroke-width="1"/>
</svg>
